name: CI

# Build verification. squirrel_away builds its own bundled extension
# (statically linking snore_core, scaffolder, surfacer, and
# surf_scaf) into demo/addons/surf_scaf/bin/. The library binary is
# named SurfScaf because squirrel_away currently reuses surf_scaf's
# lib name and addon path (this is intentional in build_utils.py's
# post_setup).
#
# What this catches: changes to squirrel_away (or upstream changes
# breaking squirrel_away's build) that break compilation.

on:
  # Cost-conscious trigger set (matches hopnbop_private's pattern):
  # active dev work pushes to `dev` and does NOT trigger CI; the
  # daily schedule + integration pushes to the slim default branches
  # do.
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC daily
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Linux, x86_64, debug)
    runs-on: ubuntu-latest
    env:
      # Opt actions/checkout@v4 (and other Node-20-based actions)
      # into Node 24 ahead of the June 2026 forced switch.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout squirrel_away
        uses: actions/checkout@v4
        with:
          path: squirrel_away

      - name: Checkout snore_core (private)
        uses: actions/checkout@v4
        with:
          repository: SnoringCatGames/snore_core
          ref: dev
          token: ${{ secrets.PRIVATECHECKOUTACCESSTOKEN }}
          path: snore_core

      - name: Checkout scaffolder
        uses: actions/checkout@v4
        with:
          repository: SnoringCatGames/scaffolder
          ref: dev
          path: scaffolder

      - name: Checkout surfacer
        uses: actions/checkout@v4
        with:
          repository: SnoringCatGames/surfacer
          ref: dev
          path: surfacer

      - name: Checkout surf_scaf (private)
        uses: actions/checkout@v4
        with:
          repository: SnoringCatGames/surf_scaf
          ref: dev
          token: ${{ secrets.PRIVATECHECKOUTACCESSTOKEN }}
          path: surf_scaf

      - name: Checkout godot-cpp (4.4)
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot-cpp
          ref: '4.4'
          path: godot-cpp

      - name: Checkout googletest
        uses: actions/checkout@v4
        with:
          repository: google/googletest
          path: googletest

      - name: Compute cache key inputs
        id: cache_inputs
        run: |
          echo "godot_cpp_sha=$(git -C godot-cpp rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "gcc_version=$(gcc -dumpversion)" >> "$GITHUB_OUTPUT"

      - name: Cache SCons compiled objects
        # godot-cpp's SConstruct calls env.CacheDir($SCONS_CACHE) when
        # the env var is set, giving content-addressed (MD5) caching of
        # every compile output. Same env carries over to the framework
        # build, so framework objects get cached too. See snore_core's
        # ci.yml for the full design rationale.
        uses: actions/cache@v4
        with:
          path: .scons-cache
          key: scons-v3-${{ runner.os }}-gcc${{ steps.cache_inputs.outputs.gcc_version }}-${{ steps.cache_inputs.outputs.godot_cpp_sha }}-${{ github.sha }}
          restore-keys: |
            scons-v3-${{ runner.os }}-gcc${{ steps.cache_inputs.outputs.gcc_version }}-${{ steps.cache_inputs.outputs.godot_cpp_sha }}-
            scons-v3-${{ runner.os }}-gcc${{ steps.cache_inputs.outputs.gcc_version }}-
            scons-v3-${{ runner.os }}-

      - name: Install SCons
        run: |
          python3 -m pip install --upgrade pip
          pip3 install scons

      - name: Build squirrel_away (CI mode, dev features + tests)
        working-directory: squirrel_away
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache
        run: scons sc_ci=yes sc_dev=yes sc_tests=yes

      - name: Verify artifact landed in demo/addons/surf_scaf/bin
        working-directory: squirrel_away
        # Bash glob with nullglob: empty array if no match. Robust across
        # OS / find quirks (this path is reached through the
        # demo/addons/surf_scaf symlink to ../surf_scaf/addon, which makes
        # find's default behavior surprising — see CLAUDE.md "GitHub
        # Actions" for context).
        run: |
          set -e
          ls -lR demo/addons/surf_scaf/bin/
          shopt -s nullglob
          files=( demo/addons/surf_scaf/bin/linux/libSurfScaf*.so )
          (( ${#files[@]} > 0 )) || { echo 'No shared library produced.'; exit 1; }
          echo "Found: ${files[*]}"
