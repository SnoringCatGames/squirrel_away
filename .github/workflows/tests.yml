name: Run tests on Windows
on:
  # workflow_call:
  push:
  pull_request:
  # merge_group:

env:
  # Update this to invalidate the cached godot build.
  GODOT_VERSION: 4.4

jobs:
  test:
    runs-on: windows-latest
    # runs-on: ubuntu-22.04
    steps:
      # Clone this repository.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          # with:
          #   lfs: true
          token: ${{ secrets.PRIVATECHECKOUTACCESSTOKEN}}

      # Setup dependencies (like installing scons).
      - name: Setup godot-cpp
        uses: ./godot-cpp/.github/actions/setup-godot-cpp
        with:
          platform: windows
          # platform: linux
          em-version: 3.1.62

      # Cache the Godot build, so we don't have to rebuild it for every push.
      - name: Restore cached Godot Editor
        id: godot-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ./godot/bin
          key: godot-${{ env.GODOT_VERSION }}
      - if: steps.godot-restore.outputs.cache-hit != 'true'
        name: Build Godot Editor
        shell: sh
        run: |
          cd godot
          scons target=editor platform=windows
          cd ..
        # scons target=editor platform=linux
      - if: steps.godot-restore.outputs.cache-hit != 'true'
        name: Save Godot Editor
        id: godot-save
        uses: actions/cache/save@v4
        with:
          path: |
            ./godot/bin
          key: ${{ steps.godot-restore.outputs.cache-primary-key }}

      # Build SnoreCore GDExtension.
      - name: Build SnoreCore GDExtension Debug Build
        shell: sh
        run: |
          cd snore_core
          scons ci=yes tests=yes optimize=debug target=template_debug platform=windows arch=x86_64 precision=single custom_api_file=extension_api.json
          cd ..
        # scons ci=yes tests=yes optimize=debug target=template_debug platform=linux arch=x86_64 precision=single custom_api_file=extension_api.json

      # Build Scaffolder GDExtension.
      - name: Build Scaffolder GDExtension Debug Build
        shell: sh
        run: |
          cd scaffolder
          scons ci=yes tests=yes optimize=debug target=template_debug platform=windows arch=x86_64 precision=single custom_api_file=extension_api.json
          cd ..
        # scons ci=yes tests=yes optimize=debug target=template_debug platform=linux arch=x86_64 precision=single custom_api_file=extension_api.json

      # Build Surfacer GDExtension.
      - name: Build Surfacer GDExtension Debug Build
        shell: sh
        run: |
          cd surfacer
          scons ci=yes tests=yes optimize=debug target=template_debug platform=windows arch=x86_64 precision=single custom_api_file=extension_api.json
          cd ..
        # scons ci=yes tests=yes optimize=debug target=template_debug platform=linux arch=x86_64 precision=single custom_api_file=extension_api.json

      - name: Trigger asset imports
        shell: sh
        run: |
          ./godot/bin/godot.windows.editor.x86_64 --verbose --editor --headless --quit --path ./demo
        # ./godot/bin/godot.linuxbsd.editor.x86_64 --verbose --editor --headless --quit --path ./demo

      - name: Create test output file
        shell: sh
        run: |
          touch test_output.txt

      - name: Run tests
        shell: sh
        run: |
          ./godot/bin/godot.windows.editor.x86_64 --verbose --headless --quit --path ./demo &> >(tee test_output.txt)
        # ./godot/bin/godot.linuxbsd.editor.x86_64 --verbose --headless --quit --path ./demo &> >(tee test_output.txt)

      - name: Check test output
        shell: sh
        run: |
          if grep -q "SnoreCore test result: ALL TESTS PASSED" test_output.txt; then
            echo "All tests passed successfully."
          else
            echo "Tests failed. Check test_output.txt for details."
            exit 1
          fi

      - name: Clean up test output file
        shell: sh
        run: |
          rm test_output.txt

      # Clean up compilation files.
      - name: Delete compilation files
        shell: sh
        run: |
          rm -rf bin/
