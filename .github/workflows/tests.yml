name: Run tests on Windows
# Auto-triggers disabled 2026-05-20. The workflow still expects the
# old nested-submodule layout (./godot-cpp, ./godot, ./submodules/*
# inside the repo), but Phase 2.5 moved every dep to a workspace-
# sibling directory that CI's actions/checkout doesn't fetch. Until
# the workflows are audited + rewritten (see bootstrapper ROADMAP),
# leave this as workflow_dispatch-only so it doesn't fail every push.
on:
  workflow_dispatch:

env:
  # Update this to invalidate the cached godot build.
  GODOT_VERSION: 4.4

jobs:
  test:
    runs-on: windows-latest
    # runs-on: ubuntu-22.04
    steps:
      # Clone this repository.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          # with:
          #   lfs: true
          token: ${{ secrets.PRIVATECHECKOUTACCESSTOKEN}}

      # Set up dependencies (like installing scons).
      - name: Set up godot-cpp
        uses: ./godot-cpp/.github/actions/setup-godot-cpp
        with:
          platform: windows
          # platform: linux
          em-version: 3.1.62

      # Cache the Godot build, so we don't have to rebuild it for every push.
      - name: Restore cached Godot Editor
        id: godot-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ./godot/bin
          key: godot-${{ env.GODOT_VERSION }}
      - if: steps.godot-restore.outputs.cache-hit != 'true'
        name: Build Godot Editor
        shell: sh
        run: |
          cd godot
          scons target=editor platform=windows
          cd ..
        # scons target=editor platform=linux
      - if: steps.godot-restore.outputs.cache-hit != 'true'
        name: Save Godot Editor
        id: godot-save
        uses: actions/cache/save@v4
        with:
          path: |
            ./godot/bin
          key: ${{ steps.godot-restore.outputs.cache-primary-key }}

      # Build the GDExtension.
      - name: Build the GDExtension Debug Build
        shell: sh
        run: |
          scons sc_ci=yes sc_tests=yes optimize=debug target=template_debug platform=windows arch=x86_64 precision=single custom_api_file=extension_api.json
        # scons sc_ci=yes sc_tests=yes optimize=debug target=template_debug platform=linux arch=x86_64 precision=single custom_api_file=extension_api.json

      - name: Trigger asset imports
        shell: sh
        run: |
          ./godot/bin/godot.windows.editor.x86_64 --verbose --editor --headless --quit --path ./demo
        # ./godot/bin/godot.linuxbsd.editor.x86_64 --verbose --editor --headless --quit --path ./demo

      - name: Create test output file
        shell: sh
        run: |
          touch test_output.txt

      - name: Run tests
        shell: sh
        run: |
          ./godot/bin/godot.windows.editor.x86_64 --verbose --headless --quit --path ./demo &> >(tee test_output.txt)
        # ./godot/bin/godot.linuxbsd.editor.x86_64 --verbose --headless --quit --path ./demo &> >(tee test_output.txt)

      - name: Check test output
        shell: sh
        run: |
          if grep -q "SnoreCore test result: ALL TESTS PASSED" test_output.txt; then
            echo "All tests passed successfully."
          else
            echo "Tests failed. Check test_output.txt for details."
            exit 1
          fi

      - name: Clean up test output file
        shell: sh
        run: |
          rm test_output.txt

      # Clean up compilation files.
      - name: Delete compilation files
        shell: sh
        run: |
          rm -rf bin/
